<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Inkwell — Lorcana Deck Forge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep:        #0c0a1a;
  --bg-panel:       #16132a;
  --bg-panel-2:     #1d1838;
  --bg-elev:        #251f47;
  --border:         #322a5e;
  --border-soft:    #251f47;
  --text:           #f1ead6;
  --text-dim:       #a59ec1;
  --text-faint:     #6b6588;
  --accent:         #d4a857;
  --accent-warm:    #e8b86e;
  --accent-glow:    rgba(212,168,87,.22);
  --danger:         #d96a6a;
  --ok:             #6ecf95;
  --shadow:         0 8px 24px rgba(0,0,0,.45);

  --ink-Amber:    #e8b86e;
  --ink-Amethyst: #9b6bb8;
  --ink-Emerald:  #5fa380;
  --ink-Ruby:     #c25458;
  --ink-Sapphire: #5b8ec4;
  --ink-Steel:    #8a93a3;
}

* { box-sizing: border-box; }
html, body, #root { height: 100%; }
body {
  margin: 0;
  font-family: "EB Garamond", "Iowan Old Style", Georgia, serif;
  font-size: 16px;
  color: var(--text);
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(155,107,184,.12), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(91,142,196,.10), transparent 60%),
    var(--bg-deep);
  background-attachment: fixed;
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3, h4, .display {
  font-family: "Cinzel", "Trajan Pro", serif;
  font-weight: 700;
  letter-spacing: .03em;
}
button { font: inherit; cursor: pointer; }
input, select, textarea {
  font: inherit;
  color: var(--text);
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 10px;
  outline: none;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ── Layout ───────────────────────────────────────────────── */
.app { min-height: 100vh; display: flex; flex-direction: column; }
.topbar {
  position: sticky; top: 0; z-index: 50;
  padding: 12px 24px;
  background: rgba(12,10,26,.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border-soft);
  display: flex; align-items: center; gap: 22px;
}
.brand { display: flex; align-items: baseline; gap: 10px; }
.brand-mark {
  font-family: "Cinzel", serif; font-size: 21px;
  color: var(--accent); letter-spacing: .18em;
}
.brand-sub { font-style: italic; color: var(--text-dim); font-size: 13px; }
.nav { margin-left: auto; display: flex; gap: 4px; }
.nav button {
  background: transparent; color: var(--text-dim);
  border: 1px solid transparent;
  padding: 7px 14px; border-radius: 999px;
  font-family: "Cinzel", serif; font-size: 12px;
  letter-spacing: .12em; text-transform: uppercase;
  transition: all .2s;
}
.nav button:hover { color: var(--text); }
.nav button.active {
  color: var(--accent); border-color: var(--accent); background: var(--accent-glow);
}
.main { flex: 1; padding: 20px 24px 64px; }

.page-header {
  display: flex; align-items: end; justify-content: space-between;
  gap: 16px; margin-bottom: 20px;
  padding-bottom: 12px; border-bottom: 1px solid var(--border-soft);
}
.page-header h1 { margin: 0; font-size: 26px; color: var(--accent); }
.page-header p { margin: 3px 0 0; color: var(--text-dim); font-style: italic; font-size: 14px; }

/* ── Buttons ───────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 13px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-panel-2);
  color: var(--text);
  font-size: 13px;
  transition: all .15s;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn-primary {
  background: linear-gradient(180deg, #d4a857, #b08838);
  color: #1a1306; border-color: #b08838; font-weight: 600;
}
.btn-primary:hover { filter: brightness(1.08); color: #1a1306; }
.btn-danger { color: var(--danger); border-color: rgba(217,106,106,.4); }
.btn-danger:hover { background: rgba(217,106,106,.1); border-color: var(--danger); }
.btn-ghost { background: transparent; border-color: transparent; color: var(--text-dim); }
.btn-ghost:hover { color: var(--accent); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

.panel {
  background: var(--bg-panel);
  border: 1px solid var(--border-soft);
  border-radius: 10px;
  padding: 16px;
}
.panel-title {
  font-family: "Cinzel", serif; font-size: 13px;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--accent); margin: 0 0 12px;
}

/* ── Ink chips ────────────────────────────────────────────── */
.ink {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
  padding: 3px 9px; border-radius: 999px;
  border: 1px solid currentColor;
}
.ink::before {
  content: ""; width: 8px; height: 8px; border-radius: 50%;
  background: currentColor;
}
.ink-Amber    { color: var(--ink-Amber); }
.ink-Amethyst { color: var(--ink-Amethyst); }
.ink-Emerald  { color: var(--ink-Emerald); }
.ink-Ruby     { color: var(--ink-Ruby); }
.ink-Sapphire { color: var(--ink-Sapphire); }
.ink-Steel    { color: var(--ink-Steel); }

/* ── Builder layout (3 columns) ───────────────────────────── */
.builder {
  display: grid;
  grid-template-columns: 230px 1fr 340px;
  gap: 18px;
  align-items: start;
}
@media (max-width: 1280px) {
  .builder { grid-template-columns: 220px 1fr 320px; gap: 14px; }
}
@media (max-width: 1100px) {
  .builder { grid-template-columns: 1fr; }
}

.filters {
  position: sticky; top: 70px;
  max-height: calc(100vh - 90px);
  overflow-y: auto;
  padding-right: 4px;
}
.filter-block { margin-bottom: 14px; }
.filter-label {
  font-family: "Cinzel", serif;
  font-size: 10.5px;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 6px;
}
.chip-row { display: flex; gap: 4px; flex-wrap: wrap; }
.chip {
  padding: 4px 9px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-panel-2);
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
}
.chip:hover { color: var(--text); border-color: var(--text-dim); }
.chip.on { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }
.chip.ink-Amber.on    { color: var(--ink-Amber);    border-color: var(--ink-Amber);    background: rgba(232,184,110,.15); }
.chip.ink-Amethyst.on { color: var(--ink-Amethyst); border-color: var(--ink-Amethyst); background: rgba(155,107,184,.18); }
.chip.ink-Emerald.on  { color: var(--ink-Emerald);  border-color: var(--ink-Emerald);  background: rgba(95,163,128,.18); }
.chip.ink-Ruby.on     { color: var(--ink-Ruby);     border-color: var(--ink-Ruby);     background: rgba(194,84,88,.18); }
.chip.ink-Sapphire.on { color: var(--ink-Sapphire); border-color: var(--ink-Sapphire); background: rgba(91,142,196,.18); }
.chip.ink-Steel.on    { color: var(--ink-Steel);    border-color: var(--ink-Steel);    background: rgba(138,147,163,.18); }

.set-list {
  max-height: 200px; overflow-y: auto;
  border: 1px solid var(--border-soft);
  border-radius: 6px;
  padding: 6px;
  background: var(--bg-panel);
}
.set-row {
  display: flex; align-items: center; gap: 8px;
  padding: 3px 6px; border-radius: 4px; cursor: pointer;
  font-size: 13px;
}
.set-row:hover { background: var(--bg-elev); }
.set-row input { margin: 0; }
.set-row .code { color: var(--text-faint); font-size: 11px; }

/* ── Cards area ───────────────────────────────────────────── */
.cards-area .search-bar { margin-bottom: 12px; display: flex; gap: 8px; align-items: center; }
.cards-area .search-bar input { flex: 1; }
.results-meta {
  font-size: 12px; color: var(--text-faint); margin-bottom: 8px;
  display: flex; justify-content: space-between; align-items: center;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}
.card-tile {
  position: relative;
  border-radius: 8px; overflow: hidden;
  background: var(--bg-panel-2);
  border: 1px solid var(--border-soft);
  cursor: pointer;
  transition: transform .12s, border-color .12s, box-shadow .12s;
}
.card-tile:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
  box-shadow: var(--shadow);
}
.card-tile img {
  display: block; width: 100%; aspect-ratio: 2.5/3.5; object-fit: cover;
  background: var(--bg-elev);
}
.card-tile .in-deck-badge {
  position: absolute; top: 6px; right: 6px;
  background: var(--accent); color: #1a1306;
  font-family: "Cinzel", serif; font-weight: 700;
  font-size: 12px;
  padding: 2px 7px;
  border-radius: 999px;
  box-shadow: 0 2px 6px rgba(0,0,0,.4);
}
.card-tile .cost-badge {
  position: absolute; top: 6px; left: 6px;
  background: rgba(12,10,26,.85);
  color: var(--text); font-size: 11px;
  padding: 2px 6px; border-radius: 4px;
  font-family: "Cinzel", serif;
}
.empty-state {
  text-align: center; padding: 40px 20px;
  color: var(--text-faint); font-style: italic;
}

/* ── Deck panel (right side) ─────────────────────────────── */
.right-rail {
  position: sticky; top: 70px;
  max-height: calc(100vh - 90px);
  display: flex; flex-direction: column; gap: 12px;
}
.synergy-panel {
  background: var(--bg-panel);
  border: 1px solid var(--border-soft);
  border-radius: 10px;
  padding: 12px;
  flex-shrink: 0;
}
.synergy-panel .header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.synergy-panel .header .title {
  font-family: "Cinzel", serif; font-size: 11px;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--accent);
}
.synergy-panel .pivot {
  font-size: 12px; color: var(--text-dim);
  margin-bottom: 8px; font-style: italic;
}
.synergy-mini-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.synergy-mini {
  position: relative;
  border-radius: 6px; overflow: hidden;
  border: 1px solid var(--border-soft);
  background: var(--bg-panel-2);
  cursor: pointer;
}
.synergy-mini:hover { border-color: var(--accent); }
.synergy-mini img {
  display: block; width: 100%; aspect-ratio: 2.5/3.5; object-fit: cover;
}
.synergy-mini-why {
  font-size: 10px;
  color: var(--text-faint);
  padding: 3px 4px;
  line-height: 1.2;
  min-height: 22px;
}
.synergy-empty {
  text-align: center; padding: 14px 0;
  color: var(--text-faint); font-style: italic; font-size: 13px;
}

.deck-panel {
  background: var(--bg-panel);
  border: 1px solid var(--border-soft);
  border-radius: 10px;
  padding: 14px;
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
}
.deck-stats {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px;
  margin-bottom: 10px;
}
.stat-box {
  padding: 6px 9px;
  background: var(--bg-panel-2);
  border-radius: 6px;
  border: 1px solid var(--border-soft);
}
.stat-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: .1em;
  color: var(--text-faint);
}
.stat-value { font-size: 16px; color: var(--text); margin-top: 2px; }
.stat-value.ok { color: var(--ok); }
.stat-value.bad { color: var(--danger); }
.deck-issues {
  background: rgba(217,106,106,.08);
  border: 1px solid rgba(217,106,106,.3);
  border-radius: 6px;
  padding: 7px 9px;
  margin-bottom: 10px;
  font-size: 12px;
  color: var(--danger);
}
.deck-issues ul { margin: 3px 0 0 16px; padding: 0; font-size: 12px; }
.deck-ok {
  background: rgba(110,207,149,.08);
  border: 1px solid rgba(110,207,149,.3);
  border-radius: 6px;
  padding: 6px 9px;
  margin-bottom: 10px;
  font-size: 12px; color: var(--ok); text-align: center;
  font-family: "Cinzel", serif; letter-spacing: .08em; text-transform: uppercase;
}
.deck-list {
  overflow-y: auto;
  flex: 1;
  margin: 0 -6px;
  padding: 0 6px;
}
.deck-row {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 4px;
  border-bottom: 1px dashed var(--border-soft);
  font-size: 13px;
}
.deck-row:last-child { border-bottom: none; }
.deck-row .count {
  font-family: "Cinzel", serif; color: var(--accent);
  width: 20px; text-align: right;
}
.deck-row .name {
  flex: 1; min-width: 0; cursor: pointer;
  text-overflow: ellipsis; white-space: nowrap; overflow: hidden;
}
.deck-row .name:hover { color: var(--accent); }
.deck-row .name .v { color: var(--text-dim); font-style: italic; font-size: 11px; }
.deck-row .ctrls { display: flex; gap: 3px; }
.deck-row .ctrls button {
  width: 20px; height: 20px; border-radius: 4px;
  background: var(--bg-elev); border: 1px solid var(--border);
  color: var(--text-dim); font-size: 13px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.deck-row .ctrls button:hover { color: var(--accent); border-color: var(--accent); }
.deck-section-h {
  font-family: "Cinzel", serif;
  font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--text-faint);
  margin: 8px 0 3px;
  padding: 0 4px;
}

/* ── Modal ───────────────────────────────────────────────── */
.modal-bg {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,.7);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.modal {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  max-width: 720px; width: 100%;
  max-height: 90vh;
  display: flex; flex-direction: column;
  box-shadow: 0 20px 50px rgba(0,0,0,.6);
}
.modal-head {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border-soft);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-head h3 { margin: 0; color: var(--accent); font-size: 17px; }
.modal-body { padding: 16px 20px; overflow-y: auto; }
.modal-foot {
  padding: 12px 20px;
  border-top: 1px solid var(--border-soft);
  display: flex; gap: 8px; justify-content: flex-end;
}
.card-detail { display: grid; grid-template-columns: 220px 1fr; gap: 20px; }
.card-detail img { width: 100%; border-radius: 10px; }
.cd-name { font-family: "Cinzel", serif; font-size: 21px; color: var(--accent); margin: 0 0 3px; }
.cd-version { font-style: italic; color: var(--text-dim); margin-bottom: 12px; }
.cd-text {
  white-space: pre-wrap; font-size: 13.5px; line-height: 1.55;
  padding: 10px 12px;
  background: var(--bg-panel-2);
  border-radius: 6px;
  border: 1px solid var(--border-soft);
  margin: 10px 0;
}
.cd-stats { display: flex; gap: 14px; margin: 8px 0; font-size: 13px; }
.cd-stats span { color: var(--text-dim); }
.cd-stats b { color: var(--text); font-weight: 600; margin-left: 4px; }

/* ── Decks index ─────────────────────────────────────────── */
.deck-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px;
}
.deck-card {
  background: var(--bg-panel);
  border: 1px solid var(--border-soft);
  border-radius: 10px;
  padding: 14px;
  cursor: pointer;
  transition: border-color .15s, transform .15s;
}
.deck-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.deck-card h3 { margin: 0 0 3px; font-size: 17px; color: var(--text); }
.deck-card .meta { font-size: 11px; color: var(--text-faint); margin-bottom: 8px; }
.deck-card .inks { display: flex; gap: 6px; flex-wrap: wrap; }

/* ── Matches ─────────────────────────────────────────────── */
.match-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
.match-form label {
  display: flex; flex-direction: column; gap: 4px;
  font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
  color: var(--text-dim);
}
.match-form .full { grid-column: 1 / -1; }
.match-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
.match-table th, .match-table td {
  padding: 7px 10px; text-align: left;
  border-bottom: 1px solid var(--border-soft);
}
.match-table th {
  font-family: "Cinzel", serif; font-size: 10.5px;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--text-faint); font-weight: 500;
}
.match-table tr:hover td { background: var(--bg-panel-2); }
.result-W { color: var(--ok); font-weight: 600; }
.result-L { color: var(--danger); font-weight: 600; }
.result-T { color: var(--text-dim); font-weight: 600; }

/* ── Stats ───────────────────────────────────────────────── */
.stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 22px; }
.big-stat { padding: 16px; background: var(--bg-panel); border: 1px solid var(--border-soft); border-radius: 10px; }
.big-stat .label { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--text-faint); margin-bottom: 6px; }
.big-stat .value { font-family: "Cinzel", serif; font-size: 30px; color: var(--accent); }
.bar-row { display: grid; grid-template-columns: 200px 1fr 80px; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px dashed var(--border-soft); }
.bar-row:last-child { border-bottom: none; }
.bar-track { height: 10px; background: var(--bg-elev); border-radius: 5px; position: relative; overflow: hidden; }
.bar-fill { position: absolute; left: 0; top: 0; bottom: 0; background: linear-gradient(90deg, var(--accent-warm), var(--accent)); border-radius: 5px; }
.bar-row .right { text-align: right; font-variant-numeric: tabular-nums; }

/* ── Loading screen ──────────────────────────────────────── */
.boot {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; padding: 40px;
  gap: 18px;
}
.boot .mark {
  font-family: "Cinzel", serif; font-size: 36px;
  color: var(--accent); letter-spacing: .2em;
}
.boot .tag { color: var(--text-dim); font-style: italic; }
.boot .progress {
  width: 360px; max-width: 80vw; height: 6px;
  background: var(--bg-panel);
  border: 1px solid var(--border-soft);
  border-radius: 999px; overflow: hidden;
}
.boot .progress .fill {
  height: 100%; background: linear-gradient(90deg, var(--accent-warm), var(--accent));
  transition: width .25s;
}
.boot .step { color: var(--text-faint); font-size: 13px; }
.boot .err {
  max-width: 480px; text-align: center;
  background: rgba(217,106,106,.08);
  border: 1px solid rgba(217,106,106,.3);
  color: var(--danger);
  padding: 14px 18px;
  border-radius: 8px;
  font-size: 14px;
}

/* ── Helpers ─────────────────────────────────────────────── */
.muted { color: var(--text-dim); }
.faint { color: var(--text-faint); }
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  display: inline-block;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.tag {
  display: inline-block; padding: 2px 8px;
  background: var(--bg-elev); border-radius: 999px;
  font-size: 11px; letter-spacing: .06em;
  color: var(--text-dim); margin-right: 4px;
}
.row { display: flex; gap: 10px; align-items: center; }
.row.wrap { flex-wrap: wrap; }
.spread { justify-content: space-between; }
.hint { font-size: 12px; color: var(--text-faint); font-style: italic; }

/* ── Cards page (synergy explorer) ───────────────────────── */
.synergy-grid {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 22px;
}
@media (max-width: 900px) { .synergy-grid { grid-template-columns: 1fr; } }
.synergy-pick {
  background: var(--bg-panel);
  border: 1px solid var(--border-soft);
  border-radius: 10px;
  overflow: hidden;
}
.synergy-pick img { width: 100%; display: block; }
.synergy-reason {
  font-size: 11px;

<script type="text/babel" data-presets="react,env">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ─── Storage abstraction ──────────────────────────────────────────────────────
const storage = {
  async get(key) {
    if (typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function') {
      try { const r = await window.storage.get(key); return r ? r.value : null; } catch { /* fall through */ }
    }
    try { return localStorage.getItem(key); } catch { return null; }
  },
  async set(key, value) {
    if (typeof window !== 'undefined' && window.storage && typeof window.storage.set === 'function') {
      try { await window.storage.set(key, value); return; } catch { /* fall through */ }
    }
    try { localStorage.setItem(key, value); } catch (e) { console.warn('storage.set failed', e); }
  }
};

const sleep = ms => new Promise(r => setTimeout(r, ms));

// ─── Constants ────────────────────────────────────────────────────────────────
const INKS = ['Amber', 'Amethyst', 'Emerald', 'Ruby', 'Sapphire', 'Steel'];
const TYPES = ['Character', 'Action', 'Item', 'Location'];
const RARITIES = ['Common', 'Uncommon', 'Rare', 'Super_rare', 'Legendary', 'Enchanted', 'Promo'];
const KEYWORDS = ['Bodyguard','Challenger','Evasive','Reckless','Resist','Rush','Shift','Singer','Support','Ward','Sing Together','Vanish','Voiceless'];

const CARDS_CACHE_KEY = 'lorcana_cards_v2';
const CARDS_CACHE_TTL = 7 * 24 * 60 * 60 * 1000; // 7 days

// ─── Lorcast API ──────────────────────────────────────────────────────────────
function trimCard(c) {
  if (!c) return null;
  const img = (c.image_uris && c.image_uris.digital) || {};
  return {
    id: c.id,
    name: c.name,
    version: c.version || null,
    image_small: img.small || null,
    image_normal: img.normal || null,
    image_large: img.large || null,
    cost: c.cost,
    inkwell: !!c.inkwell,
    ink: c.ink || null,
    type: c.type || [],
    classifications: c.classifications || null,
    text: c.text || '',
    strength: c.strength,
    willpower: c.willpower,
    lore: c.lore,
    move_cost: c.move_cost,
    rarity: c.rarity,
    collector_number: c.collector_number,
    legalities: c.legalities || { core: 'legal' },
    set: c.set ? { code: c.set.code, name: c.set.name } : null,
  };
}

async function loadAllCards(onProgress) {
  // Try cache first
  const cached = await storage.get(CARDS_CACHE_KEY);
  if (cached) {
    try {
      const parsed = JSON.parse(cached);
      if (parsed.timestamp && (Date.now() - parsed.timestamp < CARDS_CACHE_TTL)) {
        onProgress({ phase: 'cache', message: `Cache geladen (${parsed.cards.length} kaarten)` });
        return { cards: parsed.cards, sets: parsed.sets, fromCache: true };
      }
    } catch {}
  }

  onProgress({ phase: 'sets', message: 'Sets ophalen...' });
  let sets = [];
  try {
    const r = await fetch('https://api.lorcast.com/v0/sets');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    sets = (data.results || []).filter(s => s.code);
  } catch (e) {
    throw new Error(
      `Kan sets niet ophalen: ${e.message}. ` +
      `Als je dit lokaal opent met dubbelklik kan je browser fetch blokkeren — ` +
      `gebruik een lokale server (bv. 'python -m http.server') of zet hem live op GitHub Pages.`
    );
  }

  // Sort: numeric codes first ascending, then alpha (promos etc)
  sets.sort((a, b) => {
    const na = parseInt(a.code, 10);
    const nb = parseInt(b.code, 10);
    if (!isNaN(na) && !isNaN(nb)) return na - nb;
    if (!isNaN(na)) return -1;
    if (!isNaN(nb)) return 1;
    return a.code.localeCompare(b.code);
  });

  const allCards = [];
  for (let i = 0; i < sets.length; i++) {
    const set = sets[i];
    onProgress({
      phase: 'cards',
      message: `Set ${i + 1}/${sets.length}: ${set.name}`,
      current: i + 1,
      total: sets.length,
    });
    try {
      const r = await fetch(`https://api.lorcast.com/v0/sets/${set.code}/cards`);
      if (r.ok) {
        const data = await r.json();
        const cards = Array.isArray(data) ? data : (data.results || data.cards || []);
        for (const c of cards) {
          const t = trimCard(c);
          if (t && t.id) allCards.push(t);
        }
      }
    } catch (e) {
      console.warn(`Set ${set.code} failed:`, e);
    }
    await sleep(120); // friendly to API
  }

  if (allCards.length === 0) {
    throw new Error('Geen kaarten geladen — API leek bereikbaar maar gaf niets terug.');
  }

  // Cache
  try {
    await storage.set(CARDS_CACHE_KEY, JSON.stringify({
      timestamp: Date.now(),
      cards: allCards,
      sets,
    }));
  } catch (e) { console.warn('Cache opslaan mislukt:', e); }

  return { cards: allCards, sets, fromCache: false };
}

// ─── Deck helpers ─────────────────────────────────────────────────────────────
function cardKey(c) { return c.id; }
function fullName(c) { return c.version ? `${c.name} - ${c.version}` : c.name; }

function validateDeck(deck) {
  const issues = [];
  const cards = Object.values(deck.cards || {});
  const total = cards.reduce((s, c) => s + c.count, 0);
  if (total !== 60) issues.push(`Deck heeft ${total} kaarten — moet exact 60 zijn`);

  const inks = new Set();
  for (const { card } of cards) if (card.ink) inks.add(card.ink);
  if (inks.size > 2) issues.push(`Te veel inks: ${[...inks].join(', ')} — max 2`);

  const byName = {};
  for (const { card, count } of cards) {
    const k = fullName(card);
    byName[k] = (byName[k] || 0) + count;
  }
  for (const [name, cnt] of Object.entries(byName)) {
    if (cnt > 4) issues.push(`${cnt}× ${name} — max 4`);
  }
  for (const { card } of cards) {
    if (card.legalities && card.legalities.core && card.legalities.core !== 'legal') {
      issues.push(`${fullName(card)} is niet legal in Core (${card.legalities.core})`);
    }
  }
  return { valid: issues.length === 0, issues, total, inks: [...inks] };
}

function groupedDeckList(deck) {
  const groups = { Character: [], Song: [], Action: [], Item: [], Location: [] };
  for (const entry of Object.values(deck.cards)) {
    const t = entry.card.type || [];
    let bucket = 'Action';
    if (t.includes('Character')) bucket = 'Character';
    else if (t.includes('Location')) bucket = 'Location';
    else if (t.includes('Item')) bucket = 'Item';
    else if (t.includes('Song')) bucket = 'Song';
    else if (t.includes('Action')) bucket = 'Action';
    groups[bucket].push(entry);
  }
  for (const k of Object.keys(groups)) {
    groups[k].sort((a, b) => (a.card.cost || 0) - (b.card.cost || 0) || a.card.name.localeCompare(b.card.name));
  }
  return groups;
}

function parseDeckText(text, allCards) {
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  const results = { added: [], notFound: [] };
  for (const line of lines) {
    const m = line.match(/^(\d+)\s*[x×*]?\s+(.+)$/i);
    if (!m) continue;
    const count = parseInt(m[1], 10);
    const name = m[2].trim().toLowerCase();
    if (count <= 0 || !name) continue;
    // try exact full-name match first, then exact base name
    let pick = allCards.find(c => fullName(c).toLowerCase() === name);
    if (!pick) pick = allCards.find(c => c.name.toLowerCase() === name);
    if (!pick) pick = allCards.find(c => fullName(c).toLowerCase().includes(name));
    if (pick) results.added.push({ card: pick, count });
    else results.notFound.push({ name: m[2].trim(), count });
  }
  return results;
}

// ─── Synergy heuristic ────────────────────────────────────────────────────────
function synergyScore(pivot, candidate) {
  if (candidate.id === pivot.id) return { score: -1, why: [] };
  let score = 0;
  const why = [];

  if (pivot.ink && candidate.ink === pivot.ink) {
    score += 1; why.push(`Zelfde ink`);
  }
  const aCls = new Set(pivot.classifications || []);
  const bCls = new Set(candidate.classifications || []);
  const sharedCls = [...aCls].filter(c => bCls.has(c));
  if (sharedCls.length) { score += 2 * sharedCls.length; why.push(sharedCls.join(' + ')); }

  const aText = (pivot.text || '').toLowerCase();
  const bText = (candidate.text || '').toLowerCase();
  for (const kw of KEYWORDS) {
    const k = kw.toLowerCase();
    if (aText.includes(k) && bText.includes(k)) { score += 2; why.push(kw); }
  }
  if (pivot.name && bText.includes(pivot.name.toLowerCase())) {
    score += 5; why.push(`Noemt "${pivot.name}"`);
  }
  if (candidate.name && aText.includes(candidate.name.toLowerCase())) {
    score += 5; why.push(`Werkt met "${candidate.name}"`);
  }
  if (pivot.name === candidate.name && pivot.id !== candidate.id) {
    score += 4; why.push(`Shift target`);
  }
  return { score, why };
}

function topSynergies(pivot, allCards, n = 8) {
  if (!pivot) return [];
  return allCards
    .map(c => ({ card: c, ...synergyScore(pivot, c) }))
    .filter(x => x.score >= 2)
    .sort((a, b) => b.score - a.score)
    .slice(0, n);
}

// ─── Filters helpers ──────────────────────────────────────────────────────────
function applyFilters(cards, f) {
  const q = (f.q || '').trim().toLowerCase();
  return cards.filter(c => {
    if (f.inks && f.inks.length && !f.inks.includes(c.ink)) return false;
    if (f.types && f.types.length) {
      const hit = (c.type || []).some(t => f.types.includes(t));
      if (!hit) return false;
    }
    if (f.rarities && f.rarities.length && !f.rarities.includes(c.rarity)) return false;
    if (f.sets && f.sets.length) {
      if (!c.set || !f.sets.includes(c.set.code)) return false;
    }
    if (f.inkable === 'yes' && !c.inkwell) return false;
    if (f.inkable === 'no' && c.inkwell) return false;
    if (f.costMin != null && c.cost < f.costMin) return false;
    if (f.costMax != null && c.cost > f.costMax) return false;
    if (q) {
      const hay = (
        c.name + ' ' + (c.version || '') + ' ' + (c.text || '') + ' ' +
        (c.classifications || []).join(' ')
      ).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function FilterPanel({ filters, setFilters, sets }) {
  function toggle(field, value) {
    const cur = filters[field] || [];
    const next = cur.includes(value) ? cur.filter(x => x !== value) : [...cur, value];
    setFilters({ ...filters, [field]: next });
  }
  function reset() {
    setFilters({ q: filters.q, inks: [], types: [], rarities: [], sets: [], inkable: 'any', costMin: null, costMax: null });
  }

  return (
    <div className="filters">
      <div className="row spread" style={{ marginBottom: 10 }}>
        <span className="panel-title" style={{ margin: 0 }}>Filters</span>
        <button className="btn-ghost btn btn-sm" onClick={reset}>Reset</button>
      </div>

      <div className="filter-block">
        <div className="filter-label">Inks</div>
        <div className="chip-row">
          {INKS.map(i => (
            <span
              key={i}
              className={`chip ink-${i} ${(filters.inks || []).includes(i) ? 'on' : ''}`}
              onClick={() => toggle('inks', i)}
            >{i}</span>
          ))}
        </div>
      </div>

      <div className="filter-block">
        <div className="filter-label">Cost</div>
        <div className="chip-row">
          {[0,1,2,3,4,5,6,7].map(n => {
            const on = filters.costMin === n && filters.costMax === (n === 7 ? 99 : n);
            return (
              <span
                key={n}
                className={`chip ${on ? 'on' : ''}`}
                onClick={() => {
                  if (on) setFilters({ ...filters, costMin: null, costMax: null });
                  else setFilters({ ...filters, costMin: n, costMax: n === 7 ? 99 : n });
                }}
              >{n === 7 ? '7+' : n}</span>
            );
          })}
        </div>
      </div>

      <div className="filter-block">
        <div className="filter-label">Type</div>
        <div className="chip-row">
          {TYPES.map(t => (
            <span
              key={t}
              className={`chip ${(filters.types || []).includes(t) ? 'on' : ''}`}
              onClick={() => toggle('types', t)}
            >{t}</span>
          ))}
        </div>
      </div>

      <div className="filter-block">
        <div className="filter-label">Inkable</div>
        <div className="chip-row">
          {[{v:'any',l:'Alles'},{v:'yes',l:'Inkable'},{v:'no',l:'Niet'}].map(o => (
            <span
              key={o.v}
              className={`chip ${filters.inkable === o.v ? 'on' : ''}`}
              onClick={() => setFilters({ ...filters, inkable: o.v })}
            >{o.l}</span>
          ))}
        </div>
      </div>

      <div className="filter-block">
        <div className="filter-label">Rarity</div>
        <div className="chip-row">
          {RARITIES.map(r => (
            <span
              key={r}
              className={`chip ${(filters.rarities || []).includes(r) ? 'on' : ''}`}
              onClick={() => toggle('rarities', r)}
            >{r.replace('_', ' ')}</span>
          ))}
        </div>
      </div>

      <div className="filter-block">
        <div className="filter-label">Sets</div>
        <div className="set-list">
          {sets.map(s => {
            const on = (filters.sets || []).includes(s.code);
            return (
              <label key={s.code} className="set-row">
                <input type="checkbox" checked={on} onChange={() => toggle('sets', s.code)} />
                <span style={{flex: 1}}>{s.name}</span>
                <span className="code">{s.code}</span>
              </label>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── Synergy mini panel (in deck builder) ─────────────────────────────────────
function SynergyMiniPanel({ pivot, allCards, onPick, deck }) {
  const suggestions = useMemo(() => topSynergies(pivot, allCards, 8), [pivot, allCards]);
  // Filter out cards already at max count
  const filtered = suggestions.filter(({ card }) => {
    const entry = deck ? deck.cards[card.id] : null;
    return !entry || entry.count < 4;
  }).slice(0, 4);

  return (
    <div className="synergy-panel">
      <div className="header">
        <span className="title">Synergie</span>
        {pivot && <span style={{fontSize:11, color:'var(--text-faint)'}}>klik om toe te voegen</span>}
      </div>
      {!pivot ? (
        <div className="synergy-empty">Klik op een kaart om suggesties te zien</div>
      ) : (
        <>
          <div className="pivot">↳ <b>{pivot.name}</b>{pivot.version ? ` · ${pivot.version}` : ''}</div>
          {filtered.length === 0 ? (
            <div className="synergy-empty">Geen sterke matches gevonden</div>
          ) : (
            <div className="synergy-mini-grid">
              {filtered.map(({ card, why }) => (
                <div key={card.id} className="synergy-mini" onClick={() => onPick(card)} title={fullName(card) + ' — ' + why.join(' • ')}>
                  {card.image_small || card.image_normal
                    ? <img src={card.image_small || card.image_normal} alt={card.name} loading="lazy" />
                    : null}
                  <div className="synergy-mini-why">{why.slice(0, 1).join('')}</div>
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ─── Deck Builder ─────────────────────────────────────────────────────────────
const EMPTY_FILTERS = {
  q: '', inks: [], types: [], rarities: [], sets: [],
  inkable: 'any', costMin: null, costMax: null
};

function DeckBuilder({ allCards, sets, decks, setDecks, activeDeckId, setActiveDeckId }) {
  const [filters, setFilters] = useState(EMPTY_FILTERS);
  const [detail, setDetail] = useState(null);
  const [pivot, setPivot] = useState(null); // last card you interacted with (for synergy)
  const [showImport, setShowImport] = useState(false);
  const [showRename, setShowRename] = useState(false);

  const deck = decks.find(d => d.id === activeDeckId);
  const validation = useMemo(() => deck ? validateDeck(deck) : null, [deck]);

  const filtered = useMemo(() => {
    const r = applyFilters(allCards, filters);
    r.sort((a, b) => (a.cost || 0) - (b.cost || 0) || a.name.localeCompare(b.name));
    return r;
  }, [allCards, filters]);

  function newDeck() {
    const d = { id: 'd_' + Date.now(), name: 'Nieuw deck', cards: {}, created: Date.now(), updated: Date.now() };
    setDecks([...decks, d]);
    setActiveDeckId(d.id);
  }
  function updateDeck(next) {
    setDecks(decks.map(d => d.id === next.id ? { ...next, updated: Date.now() } : d));
  }
  function deleteDeck() {
    if (!deck) return;
    if (!confirm(`Deck "${deck.name}" verwijderen?`)) return;
    setDecks(decks.filter(d => d.id !== deck.id));
    setActiveDeckId(null);
  }

  function addCard(card, delta = 1) {
    setPivot(card);
    if (!deck) {
      const d = { id: 'd_' + Date.now(), name: 'Nieuw deck', cards: {}, created: Date.now(), updated: Date.now() };
      d.cards[card.id] = { card, count: Math.max(0, delta) };
      setDecks([...decks, d]);
      setActiveDeckId(d.id);
      return;
    }
    const cards = { ...deck.cards };
    const cur = cards[card.id] || { card, count: 0 };
    const next = { card, count: cur.count + delta };
    if (next.count <= 0) delete cards[card.id];
    else if (next.count > 4) cards[card.id] = { card, count: 4 };
    else cards[card.id] = next;
    updateDeck({ ...deck, cards });
  }

  function importText(text) {
    const res = parseDeckText(text, allCards);
    let target = deck;
    if (!target) {
      target = { id: 'd_' + Date.now(), name: 'Imported deck', cards: {}, created: Date.now(), updated: Date.now() };
    }
    const cards = { ...target.cards };
    for (const { card, count } of res.added) {
      const cur = cards[card.id];
      const total = (cur ? cur.count : 0) + count;
      cards[card.id] = { card, count: Math.min(4, total) };
    }
    const updated = { ...target, cards, updated: Date.now() };
    if (deck) updateDeck(updated);
    else { setDecks([...decks, updated]); setActiveDeckId(updated.id); }
    return res;
  }

  // Deck index view
  if (!activeDeckId) {
    return (
      <div>
        <div className="page-header">
          <div><h1>Decks</h1><p>Bouw, beheer en verfijn je samenstellingen.</p></div>
          <div className="row">
            <button className="btn" onClick={() => setShowImport(true)}>📋 Importeer text</button>
            <button className="btn btn-primary" onClick={newDeck}>+ Nieuw deck</button>
          </div>
        </div>
        {decks.length === 0
          ? <div className="empty-state">Nog geen decks. Maak er een aan of plak een decklist.</div>
          : (
            <div className="deck-grid">
              {decks.map(d => {
                const v = validateDeck(d);
                return (
                  <div key={d.id} className="deck-card" onClick={() => setActiveDeckId(d.id)}>
                    <h3>{d.name}</h3>
                    <div className="meta">{v.total} kaarten · {v.valid ? 'Legal' : `${v.issues.length} issue(s)`}</div>
                    <div className="inks">
                      {v.inks.length ? v.inks.map(i => <InkChip key={i} name={i} />) : <span className="faint">geen ink</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          )
        }
        {showImport && <ImportModal onClose={() => setShowImport(false)} onImport={importText} />}
      </div>
    );
  }

  // Active deck: full builder
  const grouped = groupedDeckList(deck);

  return (
    <div>
      <div className="page-header">
        <div>
          <h1 style={{ cursor: 'pointer' }} onClick={() => setShowRename(true)} title="Klik om te hernoemen">

          </h1>
          <p>{validation.total}/60 kaarten · {validation.inks.length ? validation.inks.join(' / ') : 'nog geen ink'}</p>
        </div>
        <div className="row">
          <button className="btn-ghost btn" onClick={() => setActiveDeckId(null)}>← Alle decks</button>
          <button className="btn" onClick={() => setShowImport(true)}>📋 Importeer</button>
          <button className="btn btn-danger" onClick={deleteDeck}>Verwijder</button>
        </div>
      </div>

      <div className="builder">
        <FilterPanel filters={filters} setFilters={setFilters} sets={sets} />

        <div className="cards-area">
          <div className="search-bar">
            <input
              autoFocus
              placeholder='Zoek op naam, versie, of kaarttekst...'
              value={filters.q}
              onChange={e => setFilters({ ...filters, q: e.target.value })}
            />
            {filters.q && (
              <button className="btn-ghost btn" onClick={() => setFilters({ ...filters, q: '' })}>✕</button>
            )}
          </div>
          <div className="results-meta">
            <span>{filtered.length.toLocaleString('nl-NL')} kaarten</span>
            <span className="faint">klik een kaart om toe te voegen · houd shift voor detail</span>
          </div>
          {filtered.length === 0 ? (
            <div className="empty-state">Geen kaarten matchen de filters.</div>
          ) : (
            <div className="card-grid">
              {filtered.slice(0, 300).map(c => {
                const inDeck = deck.cards[c.id];
                return (
                  <CardTile
                    key={c.id}
                    card={c}
                    onClick={(card) => {
                      // shift-click = open detail; normal click = add + show synergy
                      if (window.event && window.event.shiftKey) setDetail(card);
                      else addCard(card, +1);
                    }}
                    count={inDeck ? inDeck.count : 0}
                  />
                );
              })}
              {filtered.length > 300 && (
                <div style={{gridColumn:'1/-1', textAlign:'center', padding:'14px', color:'var(--text-faint)', fontStyle:'italic'}}>
                  Eerste 300 van {filtered.length} getoond — verfijn je filters voor meer
                </div>
              )}
            </div>
          )}
        </div>

        <div className="right-rail">
          <SynergyMiniPanel
            pivot={pivot}
            allCards={allCards}
            onPick={(c) => addCard(c, +1)}
            deck={deck}
          />

          <div className="deck-panel">
            <div className="panel-title">Deck</div>
            <div className="deck-stats">
              <div className="stat-box">
                <div className="stat-label">Aantal</div>
                <div className={`stat-value ${validation.total === 60 ? 'ok' : validation.total > 60 ? 'bad' : ''}`}>
                  {validation.total}/60
                </div>
              </div>
              <div className="stat-box">
                <div className="stat-label">Inks</div>
                <div className={`stat-value ${validation.inks.length <= 2 ? 'ok' : 'bad'}`}>
                  {validation.inks.length} / 2
                </div>
              </div>
            </div>
            <div className="row wrap" style={{ marginBottom: 10 }}>
              {validation.inks.map(i => <InkChip key={i} name={i} />)}
            </div>
            {validation.valid
              ? <div className="deck-ok">✦ Tournament Legal ✦</div>
              : validation.issues.length > 0 && (
                <div className="deck-issues">
                  <strong>Issues:</strong>
                  <ul>{validation.issues.slice(0, 4).map((i, idx) => <li key={idx}>{i}</li>)}</ul>
                  {validation.issues.length > 4 && <div className="hint">+ {validation.issues.length - 4} meer</div>}
                </div>
              )
            }
            <div className="deck-list">
              {['Character', 'Song', 'Action', 'Item', 'Location'].map(g => (
                grouped[g] && grouped[g].length > 0 && (
                  <div key={g}>
                    <div className="deck-section-h">{g}s ({grouped[g].reduce((s, e) => s + e.count, 0)})</div>
                    {grouped[g].map(entry => (
                      <div className="deck-row" key={entry.card.id}>
                        <span className="count">{entry.count}</span>
                        <div className="name" onClick={() => { setDetail(entry.card); setPivot(entry.card); }}>
                          {entry.card.name}
                          {entry.card.version && <span className="v"> · {entry.card.version}</span>}
                        </div>
                        <div className="ctrls">
                          <button onClick={() => addCard(entry.card, -1)}>−</button>
                          <button onClick={() => addCard(entry.card, +1)}>+</button>
                        </div>
                      </div>
                    ))}
                  </div>
                )
              ))}
              {validation.total === 0 && (
                <div className="empty-state" style={{ padding: 24 }}>
                  Nog leeg. Klik kaarten links om toe te voegen.
                </div>
              )}
            </div>
          </div>
        </div>
      </div>

      {detail && (
        <Modal title={fullName(detail)} onClose={() => setDetail(null)}>
          <CardDetail
            card={detail}
            count={deck.cards[detail.id] ? deck.cards[detail.id].count : 0}
            onAdd={c => { addCard(c, +1); }}
            onRemove={c => { addCard(c, -1); }}
          />
        </Modal>
      )}
      {showImport && <ImportModal onClose={() => setShowImport(false)} onImport={importText} />}
      {showRename && (
        <RenameModal
          initial={deck.name}
          onClose={() => setShowRename(false)}
          onSave={name => { updateDeck({ ...deck, name }); setShowRename(false); }}
        />
      )}
    </div>
  );
}

// ─── Match Tracker ────────────────────────────────────────────────────────────
function MatchesPage({ decks, matches, setMatches }) {
  const [editing, setEditing] = useState(null);
  function save(m) {
    if (m.id) setMatches(matches.map(x => x.id === m.id ? m : x));
    else setMatches([{ ...m, id: 'm_' + Date.now() }, ...matches]);
    setEditing(null);
  }
  function del(id) {
    if (!confirm('Wedstrijd verwijderen?')) return;
    setMatches(matches.filter(m => m.id !== id));
  }

  return (
    <div>
      <div className="page-header">
        <div><h1>Wedstrijden</h1><p>Houd je resultaten bij — losse potjes of toernooien.</p></div>
        <div><button className="btn btn-primary" onClick={() => setEditing('new')}>+ Nieuwe wedstrijd</button></div>
      </div>
      {matches.length === 0 ? (
        <div className="empty-state">Nog geen wedstrijden geregistreerd.</div>
      ) : (
        <table className="match-table">
          <thead>
            <tr><th>Datum</th><th>Mijn deck</th><th>Tegenstander</th><th>Inks</th><th>Resultaat</th><th>Toernooi</th><th></th></tr>
          </thead>
          <tbody>
            {matches.map(m => (
              <tr key={m.id}>
                <td>{m.date}</td>
                <td>{m.deckName}</td>
                <td>{m.opponentDeck || <span className="faint">—</span>}</td>
                <td>{(m.opponentInks || []).map(i => <InkChip key={i} name={i} />)}</td>
                <td><span className={`result-${m.result}`}>{m.result}</span></td>
                <td>{m.tournament || <span className="faint">—</span>}{m.round ? ` · R${m.round}` : ''}</td>
                <td style={{ textAlign: 'right' }}>
                  <button className="btn-ghost btn btn-sm" onClick={() => setEditing(m)}>Bewerk</button>

        <MatchForm decks={decks} initial={editing === 'new' ? null : editing}

function MatchForm({ decks, initial, onClose, onSave }) {
  const today = new Date().toISOString().slice(0, 10);
  const [form, setForm] = useState(initial || {
    date: today,
    deckId: decks[0] ? decks[0].id : '',
    deckName: decks[0] ? decks[0].name : '',
    deckInks: decks[0] ? validateDeck(decks[0]).inks : [],
    opponentDeck: '', opponentInks: [],
    result: 'W', tournament: '', round: '', notes: ''
  });
  function update(k, v) { setForm({ ...form, [k]: v }); }
  function toggleOppInk(ink) {
    const cur = form.opponentInks || [];
    if (cur.includes(ink)) update('opponentInks', cur.filter(i => i !== ink));
    else if (cur.length < 2) update('opponentInks', [...cur, ink]);
  }
  function pickDeck(id) {
    const d = decks.find(x => x.id === id);
    if (d) setForm({ ...form, deckId: d.id, deckName: d.name, deckInks: validateDeck(d).inks });
    else update('deckId', '');
  }
  return (
    <Modal title={initial ? 'Wedstrijd bewerken' : 'Nieuwe wedstrijd'} onClose={onClose}
      foot={<>
        <button className="btn-ghost btn" onClick={onClose}>Annuleren</button>
        <button className="btn btn-primary" onClick={() => onSave(form)}>Opslaan</button>
      </>}
    >
      <div className="match-form">
        <label>Datum<input type="date" value={form.date} onChange={e => update('date', e.target.value)} /></label>
        <label>Mijn deck
          <select value={form.deckId} onChange={e => pickDeck(e.target.value)}>
            <option value="">— kies een deck —</option>
            {decks.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
          </select>
        </label>
        <label>Resultaat
          <select value={form.result} onChange={e => update('result', e.target.value)}>
            <option value="W">Win</option><option value="L">Loss</option><option value="T">Tie</option>
          </select>
        </label>
        <label className="full">Tegenstander deck (vrije tekst)
          <input value={form.opponentDeck} onChange={e => update('opponentDeck', e.target.value)} placeholder="bv. Amber/Steel Steelsong" />
        </label>
        <label className="full">Inks van de tegenstander (max 2)
          <div className="row wrap" style={{ paddingTop: 4 }}>
            {INKS.map(i => (
              <span key={i} className={`chip ink-${i} ${(form.opponentInks || []).includes(i) ? 'on' : ''}`}
                onClick={() => toggleOppInk(i)}>{i}</span>
            ))}
          </div>
        </label>
        <label>Toernooi (optioneel)<input value={form.tournament} onChange={e => update('tournament', e.target.value)} placeholder="bv. Locals" /></label>
        <label>Ronde (optioneel)<input value={form.round} onChange={e => update('round', e.target.value)} placeholder="3" /></label>
        <label className="full">Notities (optioneel)<textarea rows={3} value={form.notes} onChange={e => update('notes', e.target.value)} /></label>
      </div>
    </Modal>
  );
}

// ─── Statistics ───────────────────────────────────────────────────────────────
function StatsPage({ decks, matches }) {
  const overall = useMemo(() => {
    const w = matches.filter(m => m.result === 'W').length;
    const l = matches.filter(m => m.result === 'L').length;
    const t = matches.filter(m => m.result === 'T').length;
    const total = matches.length;
    const wr = total ? Math.round((w / total) * 100) : 0;
    return { w, l, t, total, wr };
  }, [matches]);
  const perDeck = useMemo(() => {
    const map = new Map();
    for (const m of matches) {
      const key = m.deckId || ('name:' + m.deckName);
      if (!map.has(key)) map.set(key, { id: m.deckId, name: m.deckName || 'Onbekend', w: 0, l: 0, t: 0 });
      const e = map.get(key);
      if (m.result === 'W') e.w++;
      else if (m.result === 'L') e.l++;
      else if (m.result === 'T') e.t++;
    }
    return [...map.values()].map(e => {
      const total = e.w + e.l + e.t;
      return { ...e, total, wr: total ? Math.round((e.w / total) * 100) : 0 };
    }).sort((a, b) => b.total - a.total);
  }, [matches]);
  const perMatchup = useMemo(() => {
    const map = new Map();
    for (const m of matches) {
      const inks = (m.opponentInks || []).slice().sort();
      const key = inks.length ? inks.join('/') : 'Onbekend';
      if (!map.has(key)) map.set(key, { key, inks, w: 0, l: 0, t: 0 });
      const e = map.get(key);
      if (m.result === 'W') e.w++;
      else if (m.result === 'L') e.l++;
      else if (m.result === 'T') e.t++;
    }
    return [...map.values()].map(e => {
      const total = e.w + e.l + e.t;
      return { ...e, total, wr: total ? Math.round((e.w / total) * 100) : 0 };
    }).sort((a, b) => b.total - a.total);
  }, [matches]);

  if (matches.length === 0) {
    return <div>
      <div className="page-header"><div><h1>Statistieken</h1><p>Inzicht in je prestaties.</p></div></div>
      <div className="empty-state">Nog geen data. Registreer wedstrijden om statistieken te zien.</div>
    </div>;
  }
  return (
    <div>
      <div className="page-header"><div><h1>Statistieken</h1><p>Inzicht in je prestaties.</p></div></div>
      <div className="stat-cards">
        <div className="big-stat"><div className="label">Totaal</div><div className="value">{overall.total}</div></div>
        <div className="big-stat"><div className="label">Wins</div><div className="value">{overall.w}</div></div>
        <div className="big-stat"><div className="label">Losses</div><div className="value">{overall.l}</div></div>
        <div className="big-stat"><div className="label">Ties</div><div className="value">{overall.t}</div></div>
        <div className="big-stat"><div className="label">Win Rate</div><div className="value">{overall.wr}%</div></div>
      </div>
      <div className="panel" style={{ marginBottom: 18 }}>
        <div className="panel-title">Per Deck</div>
        {perDeck.map(d => (
          <div key={d.name + (d.id || '')} className="bar-row">
            <span>{d.name}</span>
            <div className="bar-track"><div className="bar-fill" style={{ width: `${d.wr}%` }} /></div>
            <div className="right"><b>{d.wr}%</b> <span className="faint">({d.w}-{d.l}-{d.t})</span></div>
          </div>
        ))}
      </div>
      <div className="panel">
        <div className="panel-title">Per Matchup (kleur van tegenstander)</div>
        {perMatchup.map(m => (
          <div key={m.key} className="bar-row">
            <div className="row wrap">{m.inks.length ? m.inks.map(i => <InkChip key={i} name={i} />) : <span className="faint">Onbekend</span>}</div>
            <div className="bar-track"><div className="bar-fill" style={{ width: `${m.wr}%` }} /></div>
            <div className="right"><b>{m.wr}%</b> <span className="faint">({m.w}-{m.l}-{m.t})</span></div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Root App ─────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('builder');
  const [allCards, setAllCards] = useState(null);
  const [sets, setSets] = useState([]);
  const [bootError, setBootError] = useState(null);
  const [bootProgress, setBootProgress] = useState({ phase: 'init', message: 'Starten...' });

  const [decks, setDecks] = useState([]);
  const [matches, setMatches] = useState([]);
  const [activeDeckId, setActiveDeckId] = useState(null);
  const [userDataLoaded, setUserDataLoaded] = useState(false);

  // Boot: load cards
  useEffect(() => {
    (async () => {
      try {
        const { cards, sets: setList } = await loadAllCards(setBootProgress);
        setAllCards(cards);
        setSets(setList);
      } catch (e) {
        setBootError(e.message || String(e));
      }
    })();
  }, []);

  // Load user data
  useEffect(() => {
    (async () => {
      const d = await storage.get('lorcana_decks');
      const m = await storage.get('lorcana_matches');
      if (d) { try { setDecks(JSON.parse(d)); } catch {} }
      if (m) { try { setMatches(JSON.parse(m)); } catch {} }
      setUserDataLoaded(true);
    })();
  }, []);

  // Save user data
  useEffect(() => { if (userDataLoaded) storage.set('lorcana_decks', JSON.stringify(decks)); }, [decks, userDataLoaded]);
  useEffect(() => { if (userDataLoaded) storage.set('lorcana_matches', JSON.stringify(matches)); }, [matches, userDataLoaded]);

  async function refreshCardData() {
    if (!confirm('Cache leegmaken en alle kaarten opnieuw ophalen?')) return;
    await storage.set(CARDS_CACHE_KEY, '');
    setAllCards(null);
    setBootError(null);
    setBootProgress({ phase: 'init', message: 'Starten...' });
    try {
      const { cards, sets: setList } = await loadAllCards(setBootProgress);
      setAllCards(cards);
      setSets(setList);
    } catch (e) {
      setBootError(e.message || String(e));
    }
  }

  if (bootError) {
    return (
      <div className="boot">
        <div className="mark">INKWELL</div>
        <div className="err">{bootError}</div>
        <button className="btn btn-primary" onClick={() => location.reload()}>Opnieuw proberen</button>
      </div>
    );
  }

  if (!allCards) {
    const pct = bootProgress.total ? Math.round((bootProgress.current / bootProgress.total) * 100) : 5;
    return (
      <div className="boot">
        <div className="mark">INKWELL</div>
        <div className="tag">a Lorcana forge</div>
        <div className="progress"><div className="fill" style={{ width: pct + '%' }} /></div>
        <div className="step">{bootProgress.message}</div>
      </div>
    );
  }

  return (
    <div className="app">
      <div className="topbar">
        <div className="brand">
          <div className="brand-mark">INKWELL</div>
          <div className="brand-sub">a Lorcana forge</div>
        </div>
        <div className="nav">
          <button className={tab === 'builder' ? 'active' : ''} onClick={() => setTab('builder')}>Decks</button>
          <button className={tab === 'cards' ? 'active' : ''} onClick={() => setTab('cards')}>Kaarten · Synergie</button>
          <button className={tab === 'matches' ? 'active' : ''} onClick={() => setTab('matches')}>Wedstrijden</button>
          <button className={tab === 'stats' ? 'active' : ''} onClick={() => setTab('stats')}>Statistieken</button>
          <button className="btn-ghost btn btn-sm" title="Kaartdata verversen" onClick={refreshCardData} style={{marginLeft: 8}}>↻</button>
        </div>
      </div>
      <div className="main">
        {tab === 'builder' && (
          <DeckBuilder
            allCards={allCards} sets={sets}
            decks={decks} setDecks={setDecks}
            activeDeckId={activeDeckId} setActiveDeckId={setActiveDeckId}
          />
        )}
        {tab === 'cards' && <CardsPage allCards={allCards} sets={sets} />}
        {tab === 'matches' && <MatchesPage decks={decks} matches={matches} setMatches={setMatches} />}
        {tab === 'stats' && <StatsPage decks={decks} matches={matches} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
